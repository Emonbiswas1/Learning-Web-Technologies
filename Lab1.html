<!DOCTYPE html>
<head>
    <title>Internship Confirmation form</title>
</head>

<body>
    <h2>Internship Confirmation form</h2>
    <h4>Student Name</h4>
    <input type="text">
    <h4>Email Address</h4>
    <input type="text">
    <h4>Prefered Internship Type</h4>
    <input type="radio"name="type">On-Site
    <input type="radio"name="type">Remote
    <h4>Internship Duration</h4>
    <select>
        <option>6 Weeks</option>
        <option>3 Months</option>


    </select>
     <h4>Skills of Interest</h4>
    <input type="checkbox"name="type">Web Development
    <input type="checkbox"name="type">Data Analysis 
    <input type="checkbox"name="type">Mobile Apps 
    <p> </p>
    <input type="Submit">  
</body>
</!DOCTYPE>
