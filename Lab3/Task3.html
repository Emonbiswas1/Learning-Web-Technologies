<!DOCTYPE html>
<html>
    <head>

        <title>Student Service Portal</title>
        
    </head>

    <body>
        <h1>Student Service Portal</h1>
        <p>Welcome to the student service portal</p>
        <nav>
            <a href="Home">Home</a> <br>
            <a href="Services">Services</a><br>
            <a href="Resource">Resource</a><br>
            <a href="Contact">Contact</a><br>
        </nav>
        <main>

           <h2>Available Services</h2> 
           <form>
           <h3>Student Name:</h3>
           <input type="text" 50 required> <br>
           <h3>Student ID:</h3>
           <input type="text" 10, minlength="5" required> <br>
           <h3>Email Address:</h3>
           <input type="email" required> <br>
           <h3>Service Type:</h3>
           <select>
            <option>Transcript</option>
            <option>ID Card</option>
            <option>General Inquiry</option>
           </select>
           <h3>Urgency Level</h3>
           <input type="radio" name="level" value="low">Low<br>
           <input type="radio" name="level" value="medium">Medium<br>
           <input type="radio" name="level" value="High">High<br>
           <br>
           <h3>Additional Details:</h3>
           <textarea name="details" required></textarea><br>

           <input type="submit" value="Submit"> <br>
           

        </main>
        <footer>
            <p>&copy; 2026 Student Service Portal</p>
        </footer>
    </body>
</html>
